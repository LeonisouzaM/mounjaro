<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - Mounjaro Gelatina</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app" class="app-container">
        <!-- Header starts visible implicitly inside steps but we can have a floating logo -->
        <header class="app-header">
            <h1 class="logo">Mounjaro<br><span>Gelatina</span></h1>
        </header>

        <!-- Progress Bar (hidden on start page) -->
        <div id="progress-container" class="progress-wrapper" style="display: none;">
            <div class="progress-bar-bg">
                <div id="progress-bar" class="progress-bar-fill"></div>
            </div>
        </div>

        <main id="step-container" class="step-container">
            <!-- Content will be injected here by app.js -->
        </main>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
